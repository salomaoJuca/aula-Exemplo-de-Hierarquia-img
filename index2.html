<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing Page com Grid e Respiro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', sans-serif;
            color: #2d3436;
            line-height: 1.6;
            background-color: #fff;
        }

        /* --- White Space Estratégico --- */
        section {
            padding: 100px 10%; /* Espaçamento vertical generoso para o site respirar */
        }

        /* --- O Recheio (Main Content) com CSS GRID --- */
        .grid-container {
            display: grid;
            grid-template-columns: 1fr 1fr; /* Duas colunas iguais */
            gap: 60px; /* Espaço entre as colunas */
            align-items: center;
        }

        /* Nível 1: Título Gigante */
        h1 {
            font-size: 3.8rem;
            line-height: 1.1;
            margin-bottom: 24px;
            color: #111;
        }

        /* Nível 2: Texto de Apoio */
        .description {
            font-size: 1.2rem;
            color: #636e72;
            margin-bottom: 40px;
        }

        /* Nível 3: Botão Principal (Destaque único) */
        .btn-main {
            display: inline-block;
            background-color: #00b894; /* Cor única de conversão */
            color: white;
            padding: 20px 45px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 5px;
            transition: 0.3s;
        }

        .btn-main:hover {
            background-color: #00a087;
            box-shadow: 0 10px 20px rgba(0, 184, 148, 0.2);
        }

        /* Imagem/Vídeo Representativo */
        .visual-content {
            background-color: #dfe6e9;
            border-radius: 20px;
            height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #b2bec3;
        }

        /* Responsividade (Grid vira coluna única no mobile) */
        @media (max-width: 900px) {
            .grid-container { grid-template-columns: 1fr; text-align: center; }
            section { padding: 60px 5%; }
            h1 { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

    <main>
        <section>
            <div class="grid-container">
                <div class="content-text">
                    <h1>Aprenda Web Design</h1>
                    <p class="description">
                        Pare de criar sites genéricos. Aprenda a dominar o Grid, o espaçamento e a hierarquia visual para criar projetos de alto nível.
                    </p>
                    <a href="#" class="btn-main">Fazer Inscrição Agora</a>
                </div>

                <div class="visual-content">
    <img src="meusBB.jpeg" alt="Preview do curso de Web Design">
</div>
            </div>
        </section>
    </main>

</body>
</html>
